name: update-singbox-rules

on:
  schedule:
    - cron: "10 19 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install surge2sing
        run: |
          wget https://github.com/subadubadub/surge2sing/releases/latest/download/surge2sing_linux_amd64.tar.gz
          tar -xzf surge2sing_linux_amd64.tar.gz
          chmod +x surge2sing
          sudo mv surge2sing /usr/local/bin/

      - name: Prepare folders
        run: mkdir -p source rules

      - name: Download Surge rules
        shell: bash
        run: |
          set -euo pipefail
          while read -r name url; do
            [ -z "${name:-}" ] && continue
            [[ "$name" =~ ^# ]] && continue
            curl -L --fail --retry 3 "$url" -o "source/${name}.list"
          done < rules.txt

      - name: Convert to sing-box
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          for f in source/*.list; do
            name="$(basename "$f" .list)"
            surge2sing -i "$f" -o "rules/${name}"
          done

      - name: Commit and push
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add rules.txt source rules
          git diff --cached --quiet || git commit -m "chore: update rules"
          git push

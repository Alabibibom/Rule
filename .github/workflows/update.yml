name: update-singbox-srs

on:
  schedule:
    - cron: "10 19 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install sing-box
        run: |
          wget https://github.com/SagerNet/sing-box/releases/latest/download/sing-box-1.9.3-linux-amd64.tar.gz
          tar -xzf sing-box-1.9.3-linux-amd64.tar.gz
          sudo mv sing-box-1.9.3-linux-amd64/sing-box /usr/local/bin/
          sing-box version

      - name: Prepare folders
        run: mkdir -p source srs

      - name: Download Surge rules
        shell: bash
        run: |
          set -euo pipefail
          while read -r name url; do
            [ -z "${name:-}" ] && continue
            [[ "$name" =~ ^# ]] && continue
            curl -L --fail --retry 3 "$url" -o "source/${name}.list"
          done < rules.txt

      - name: Compile to SRS
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          for f in source/*.list; do
            name="$(basename "$f" .list)"
            sing-box rule-set compile "$f" --output "srs/${name}.srs" --format binary
          done

      - name: Commit and push
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add rules.txt source srs
          git diff --cached --quiet || git commit -m "chore: update SRS rules"
          git push

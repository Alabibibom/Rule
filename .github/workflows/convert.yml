name: Convert Surge Rules to sing-box

on:
  schedule:
    - cron: "0 2 * * *"   # 每天北京时间 10:00 自动跑
  workflow_dispatch:        # 支持手动触发
  push:
    paths:
      - "scripts/convert.py"

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # 需要写权限才能 push output/

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run converter
        run: python scripts/convert.py

      - name: Commit & push output
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --cached --quiet || git commit -m "chore: auto-update ruleset $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

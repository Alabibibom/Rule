name: Convert Surge Rules to sing-box

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    paths:
      - "scripts/convert.py"
      - "custom/**"

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install sing-box
        run: |
          LATEST=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
          VERSION=${LATEST#v}
          curl -Lo sing-box.tar.gz "https://github.com/SagerNet/sing-box/releases/download/${LATEST}/sing-box-${VERSION}-linux-amd64.tar.gz"
          tar -xzf sing-box.tar.gz
          sudo mv sing-box-${VERSION}-linux-amd64/sing-box /usr/local/bin/
          sing-box version

      - name: Run converter
        timeout-minutes: 10
        run: python scripts/convert.py

      - name: Compile .json to .srs
        run: |
          mkdir -p output/srs
          for f in output/*.json; do
            name=$(basename "$f" .json)
            if [[ "$name" == _* ]]; then continue; fi
            sing-box rule-set compile "$f" -o "output/srs/${name}.srs"
            echo "✓ ${name}.srs"
          done
          rm -f output/*.json

      - name: Commit & push output
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --cached --quiet || git commit -m "chore: auto-update ruleset $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

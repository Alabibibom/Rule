name: Convert Surge Rules to sing-box

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
  push:
    paths:
      - "scripts/convert.py"

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run converter
        timeout-minutes: 10
        run: python scripts/convert.py

      - name: Commit & push output
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --cached --quiet || git commit -m "chore: auto-update ruleset $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
